<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Country Codes Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <style>
        .table-actions { white-space: nowrap; }
        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 5px;
            width: 400px;
        }
        #search-result {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">🌍 Country Codes Manager</h1>

    <div class="card mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-8">
                    <input type="text" id="search-input" class="form-control" placeholder="Search by name or code..." oninput="handleSearch()">
                </div>
                <div class="col-md-4">
                    <div id="search-result"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Countries</h5>
            <button class="btn btn-success" onclick="openModal()">Add Country</button>
        </div>
        <div class="card-body">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Code</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="country-table-body">
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal -->
<div id="modal-overlay" style="display: none;">
    <div class="modal-content">
        <h3 id="modal-title"></h3>
        <div class="mb-3">
            <label for="modal-name" class="form-label">Country Name</label>
            <input type="text" class="form-control" id="modal-name">
        </div>
        <div class="mb-3">
            <label for="modal-code" class="form-label">Country Code</label>
            <input type="text" class="form-control" id="modal-code">
        </div>
        <div class="d-flex justify-content-end">
            <button class="btn btn-secondary me-2" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveCountry()">Save</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
